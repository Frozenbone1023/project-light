<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>빛공해 측정기</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0a12;
            color: #c8d8e8;
            min-height: 100vh;
            padding: 16px;
        }

        h1 {
            font-size: 18px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #7eb8d4;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid #1e2a36;
        }

        .luminance-display {
            background: #0d1520;
            border: 1px solid #1e3a50;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 12px;
        }

        .luminance-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 14px;
        }

        .luminance-label {
            font-size: 11px;
            letter-spacing: 2px;
            color: #4a6a80;
            text-transform: uppercase;
        }

        .luminance-value {
            font-size: 48px;
            font-weight: bold;
            color: #ffd060;
            line-height: 1;
        }

        .luminance-unit {
            font-size: 14px;
            color: #4a6a80;
            margin-top: 4px;
        }

        .luminance-meter {
            position: relative;
            height: 12px;
            overflow: hidden;
            border-radius: 999px;
            background: linear-gradient(90deg, #071018, #102236);
            border: 1px solid #1e3a50;
        }

        .luminance-fill {
            width: 0%;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, #5bc0eb, #a8d8c0 52%, #ffd060 78%, #e87070);
            box-shadow: 0 0 14px rgba(255, 208, 96, 0.42);
            transition: width 0.35s ease, filter 0.35s ease;
        }

        .luminance-fill.unstable {
            filter: saturate(1.25);
            animation: pulseBar 0.9s ease-in-out infinite alternate;
        }

        .luminance-meta {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
            font-size: 11px;
            letter-spacing: 1px;
            color: #4a6a80;
        }

        .luminance-meta span:last-child { text-align: right; }

        .stability-pill {
            min-width: 116px;
            padding: 4px 10px;
            border-radius: 999px;
            text-align: center;
            color: #4a6a80;
            border: 1px solid #1e3a50;
            background: rgba(10, 18, 28, 0.8);
        }

        .stability-pill.stable {
            color: #6dcc8a;
            border-color: rgba(109, 204, 138, 0.45);
        }

        .stability-pill.caution {
            color: #ffd060;
            border-color: rgba(255, 208, 96, 0.45);
        }

        .stability-pill.unstable {
            color: #e87070;
            border-color: rgba(232, 112, 112, 0.55);
        }

        .exposure-panel {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #1a2530;
            font-size: 11px;
            letter-spacing: 1px;
            color: #4a6a80;
        }

        .exposure-pill {
            flex: 0 0 auto;
            min-width: 128px;
            padding: 5px 10px;
            border-radius: 999px;
            text-align: center;
            color: #4a6a80;
            border: 1px solid #1e3a50;
            background: rgba(10, 18, 28, 0.8);
        }

        .exposure-pill.checking { color: #7eb8d4; border-color: rgba(126, 184, 212, 0.45); }
        .exposure-pill.locked { color: #6dcc8a; border-color: rgba(109, 204, 138, 0.5); }
        .exposure-pill.live { color: #ffd060; border-color: rgba(255, 208, 96, 0.48); }
        .exposure-pill.blocked,
        .exposure-pill.unsupported { color: #e87070; border-color: rgba(232, 112, 112, 0.55); }

        .exposure-detail {
            min-width: 0;
            text-align: right;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .exposure-control {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #1a2530;
            font-size: 11px;
            letter-spacing: 1px;
            color: #4a6a80;
        }

        .exposure-options {
            display: grid;
            grid-template-columns: repeat(3, 42px);
            gap: 6px;
        }

        .exposure-option {
            width: 42px;
            min-height: 28px;
            margin: 0;
            padding: 0;
            border-radius: 6px;
            border: 1px solid #1e3a50;
            background: #0a121c;
            color: #7eb8d4;
            font-size: 12px;
            letter-spacing: 0;
        }

        .exposure-option.active {
            border-color: #ffd060;
            background: #1d2730;
            color: #ffd060;
        }

        @keyframes pulseBar {
            from { opacity: 0.72; }
            to { opacity: 1; }
        }

        .camera-preview {
            width: 100%;
            max-height: 120px;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 12px;
            background: #0d1520;
            border: 1px solid #1e3a50;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        video {
            width: 100%;
            max-height: 120px;
            object-fit: cover;
            display: block;
            opacity: 0.6;
        }

        .camera-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 11px;
            letter-spacing: 2px;
            color: #ffd060;
            text-transform: uppercase;
            pointer-events: none;
        }

        .measure-frame {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20%;
            height: 20%;
            min-width: 28px;
            min-height: 28px;
            transform: translate(-50%, -50%);
            border: 2px solid #ffd060;
            box-shadow: 0 0 0 999px rgba(10, 10, 18, 0.18), 0 0 12px rgba(255, 208, 96, 0.55);
            pointer-events: none;
        }

        .gps-panel {
            background: #0d1520;
            border: 1px solid #1e3a50;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 12px;
            font-size: 12px;
        }

        .gps-row {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
        }

        .gps-key { color: #4a6a80; letter-spacing: 1px; }
        .gps-val { color: #a8d8c0; font-weight: bold; }

        .status-bar {
            background: #0d1520;
            border: 1px solid #1e3a50;
            border-radius: 6px;
            padding: 8px 14px;
            margin-bottom: 12px;
            font-size: 12px;
            letter-spacing: 1px;
            min-height: 34px;
            display: flex;
            align-items: center;
        }

        .status-ok { color: #6dcc8a; }
        .status-warn { color: #ffd060; }
        .status-err { color: #e87070; }

        button {
            width: 100%;
            padding: 14px;
            margin-bottom: 8px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
            transition: opacity 0.15s, transform 0.1s;
        }

        button:active { transform: scale(0.98); opacity: 0.85; }

        #btn-start {
            background: #1e3a50;
            color: #7eb8d4;
            border: 1px solid #2e5a70;
        }

        #btn-measure {
            background: #ffd060;
            color: #0a0a12;
        }

        #btn-csv {
            background: #1e3050;
            color: #7ea8d4;
            border: 1px solid #2e4a70;
        }

        .record-count {
            font-size: 11px;
            color: #4a6a80;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .record-list {
            list-style: none;
            max-height: 220px;
            overflow-y: auto;
        }

        .record-list li {
            padding: 8px 12px;
            border-bottom: 1px solid #1a2530;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .record-list li:last-child { border-bottom: none; }

        .rec-time { color: #4a6a80; }
        .rec-luminance { color: #ffd060; font-weight: bold; font-size: 14px; }
        .rec-loc { color: #7ea8a0; font-size: 11px; }
    </style>
</head>
<body>

    <h1>🌙 빛공해 측정기</h1>

    <div class="camera-preview" id="cameraBox">
        <video id="video" autoplay playsinline muted></video>
        <div class="measure-frame" aria-hidden="true"></div>
        <div class="camera-overlay" id="cameraLabel">카메라 시작 전</div>
    </div>

    <div class="luminance-display">
        <div class="luminance-head">
            <div>
                <div class="luminance-label">하늘 밝기 지수</div>
                <div class="luminance-unit">Relative Luminance (휘도 지수)</div>
            </div>
            <div style="text-align:right">
                <div class="luminance-value" id="luminance-value">--</div>
            </div>
        </div>
        <div class="luminance-meter" aria-hidden="true">
            <div class="luminance-fill" id="luminance-fill"></div>
        </div>
        <div class="luminance-meta">
            <span>0</span>
            <span class="stability-pill" id="stability-indicator">안정도 확인 중</span>
            <span>1000</span>
        </div>
        <div class="exposure-panel">
            <span>AE 상태</span>
            <span class="exposure-pill" id="exposure-indicator">대기 중</span>
            <span class="exposure-detail" id="exposure-detail">카메라 시작 전</span>
        </div>
        <div class="exposure-control">
            <span>노출 보정</span>
            <div class="exposure-options" id="exposure-options">
                <button class="exposure-option active" type="button" data-compensation="0">0</button>
                <button class="exposure-option" type="button" data-compensation="1">+1</button>
                <button class="exposure-option" type="button" data-compensation="2">+2</button>
            </div>
        </div>
    </div>

    <div class="gps-panel">
        <div class="gps-row">
            <span class="gps-key">위도</span>
            <span class="gps-val" id="lat">대기 중</span>
        </div>
        <div class="gps-row">
            <span class="gps-key">경도</span>
            <span class="gps-val" id="lng">대기 중</span>
        </div>
    </div>

    <div class="status-bar" id="status">
        <span class="status-warn">▶ 카메라 시작 버튼을 누르세요</span>
    </div>

    <button id="btn-start">📷 카메라 시작</button>
    <button id="btn-measure" disabled>📍 현재 위치 측정 기록</button>
    <button id="btn-csv">📥 CSV 다운로드</button>

    <div class="record-count" id="record-count">기록: 0개</div>
    <ul class="record-list" id="record-list"></ul>

    <script>
        let currentLat = null;
        let currentLng = null;
        let currentLuminanceIndex = 0;
        let videoStream = null;
        let luminanceInterval = null;
        let stabilityState = 'checking';
        let unstableWarningVisible = false;
        let exposureLocked = false;
        let exposureRetryTimer = null;
        let exposureRetryRunning = false;
        let selectedExposureCompensation = 0;
        const luminanceSamples = [];
        const MAX_STABILITY_SAMPLES = 6;
        const CAUTION_RANGE = 45;
        const UNSTABLE_RANGE = 90;
        const UNSTABLE_STATUS_MESSAGE = '측정값 변동이 큽니다. 휴대폰을 고정하고 주변 직접광을 피해주세요.';
        const AE_WARMUP_MS = 8000;
        const MIN_LUMINANCE_TO_LOCK = 25;
        const MAX_LUMINANCE_TO_LOCK = 960;
        const EXPOSURE_SAMPLE_INTERVAL_MS = 700;
        const EXPOSURE_RETRY_MS = 5000;
        const EXPOSURE_RETRY_SAMPLE_MS = 3500;
        const LOCK_RANGE_LIMIT = 70;
        const LOCK_RELATIVE_RANGE = 0.35;
        const LOCK_MIN_SAMPLES = 6;
        const records = [];

        function setStatus(msg, type = 'ok') {
            const el = document.getElementById('status');
            el.innerHTML = `<span class="status-${type}">${msg}</span>`;
        }

        function updateLuminanceMeter(value) {
            const fill = document.getElementById('luminance-fill');
            const percent = Math.max(0, Math.min(100, value / 10));
            fill.style.width = `${percent}%`;
        }

        function updateStability(value) {
            const indicator = document.getElementById('stability-indicator');
            const fill = document.getElementById('luminance-fill');
            luminanceSamples.push(value);
            if (luminanceSamples.length > MAX_STABILITY_SAMPLES) luminanceSamples.shift();

            if (luminanceSamples.length < 4) {
                indicator.textContent = '안정도 확인 중';
                indicator.className = 'stability-pill';
                fill.classList.remove('unstable');
                stabilityState = 'checking';
                return;
            }

            const min = Math.min(...luminanceSamples);
            const max = Math.max(...luminanceSamples);
            const range = max - min;
            let nextState = 'stable';
            let label = `안정 ±${Math.round(range / 2)}`;

            if (range >= UNSTABLE_RANGE) {
                nextState = 'unstable';
                label = `불안정 Δ${range}`;
            } else if (range >= CAUTION_RANGE) {
                nextState = 'caution';
                label = `주의 Δ${range}`;
            }

            indicator.textContent = label;
            indicator.className = `stability-pill ${nextState}`;
            fill.classList.toggle('unstable', nextState === 'unstable');

            if (nextState === 'unstable' && stabilityState !== 'unstable') {
                setStatus(UNSTABLE_STATUS_MESSAGE, 'warn');
                unstableWarningVisible = true;
            } else if (unstableWarningVisible && stabilityState === 'unstable' && nextState !== 'unstable') {
                unstableWarningVisible = false;
                setStatus(nextState === 'stable' ? '측정값이 안정되었습니다. 기록해도 좋습니다.' : '측정값 변동이 줄었습니다. 조금 더 고정하면 안정됩니다.', nextState === 'stable' ? 'ok' : 'warn');
            }
            stabilityState = nextState;
        }

        // GPS 시작
        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition((pos) => {
                currentLat = pos.coords.latitude.toFixed(6);
                currentLng = pos.coords.longitude.toFixed(6);
                document.getElementById('lat').textContent = currentLat;
                document.getElementById('lng').textContent = currentLng;
            }, () => {
                document.getElementById('lat').textContent = 'GPS 권한 필요';
            }, { enableHighAccuracy: true });
        }

        document.getElementById('exposure-options').addEventListener('click', (event) => {
            const button = event.target.closest('.exposure-option');
            if (!button) return;

            selectedExposureCompensation = Number(button.dataset.compensation);
            updateExposureOptionUI();

            if (!videoStream) {
                updateExposureStatus('대기 중', '', `보정값 ${selectedExposureCompensation >= 0 ? '+' : ''}${selectedExposureCompensation}`);
                return;
            }

            const [track] = videoStream.getVideoTracks();
            updateExposureStatus('보정 변경됨', 'checking', `보정값 ${selectedExposureCompensation >= 0 ? '+' : ''}${selectedExposureCompensation}`);
            setStatus('노출 보정값이 변경되었습니다. AE 잠금을 다시 평가합니다.', 'warn');
            restartExposureEvaluation(track);
        });

        function updateExposureOptionUI() {
            document.querySelectorAll('.exposure-option').forEach(btn => {
                btn.classList.toggle('active', Number(btn.dataset.compensation) === selectedExposureCompensation);
            });
        }

        function restartExposureEvaluation(track) {
            exposureLocked = false;
            if (exposureRetryTimer) {
                clearTimeout(exposureRetryTimer);
                exposureRetryTimer = null;
            }
            scheduleExposureRetry(track);
        }

        function wait(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function updateExposureStatus(label, state = '', detail = '') {
            const indicator = document.getElementById('exposure-indicator');
            const detailEl = document.getElementById('exposure-detail');
            indicator.textContent = label;
            indicator.className = `exposure-pill ${state}`;
            detailEl.textContent = detail;
        }

        function getExposureCapabilities(track) {
            return typeof track.getCapabilities === 'function' ? track.getCapabilities() : {};
        }


        function getSkyExposureCompensation(track) {
            const range = getExposureCapabilities(track).exposureCompensation;
            if (!range) return selectedExposureCompensation;

            const min = typeof range.min === 'number' ? range.min : -Infinity;
            const max = typeof range.max === 'number' ? range.max : Infinity;
            const step = typeof range.step === 'number' && range.step > 0 ? range.step : 0;
            let value = Math.max(min, Math.min(max, selectedExposureCompensation));
            if (step) value = Math.round(value / step) * step;
            return value;
        }

        async function applyExposureConstraints(track, exposureMode, exposureCompensation) {
            if (!track || typeof track.applyConstraints !== 'function') return false;

            const attempts = [];
            if (typeof exposureCompensation === 'number') {
                attempts.push({ exposureMode, exposureCompensation });
            }
            attempts.push({ exposureMode });

            for (const advanced of attempts) {
                try {
                    await track.applyConstraints({ advanced: [advanced] });
                    return true;
                } catch (err) {
                    console.warn('노출 제어 적용 실패', advanced, err);
                }
            }

            return false;
        }

        function summarizeSamples(samples) {
            const min = Math.min(...samples);
            const max = Math.max(...samples);
            const avg = Math.round(samples.reduce((sum, value) => sum + value, 0) / samples.length);
            const range = max - min;
            return { min, max, avg, range, last: samples[samples.length - 1] };
        }

        function evaluateExposureReadiness(summary) {
            if (summary.avg < MIN_LUMINANCE_TO_LOCK) return { ok: false, reason: 'tooDark', label: 'AE 유지', detail: `너무 어두움 avg ${summary.avg}` };
            if (summary.max >= MAX_LUMINANCE_TO_LOCK) return { ok: false, reason: 'tooBright', label: '잠금 보류', detail: `직접광/포화 max ${summary.max}` };

            const allowedRange = Math.max(LOCK_RANGE_LIMIT, Math.round(summary.avg * LOCK_RELATIVE_RANGE));
            if (summary.range > allowedRange) {
                return { ok: false, reason: 'notStable', label: 'AE 유지', detail: `노출 적응 중 Δ${summary.range}` };
            }

            return { ok: true, reason: 'ready', label: '잠금 준비', detail: `avg ${summary.avg}, Δ${summary.range}` };
        }

        async function collectExposureSamples(durationMs = AE_WARMUP_MS) {
            const samples = [];
            const startedAt = Date.now();

            while (Date.now() - startedAt < durationMs || samples.length < LOCK_MIN_SAMPLES) {
                const value = calcLuminanceFromVideo(false);
                if (typeof value === 'number') samples.push(value);

                const remaining = Math.max(0, Math.ceil((durationMs - (Date.now() - startedAt)) / 1000));
                updateExposureStatus('AE 적응 중', 'checking', `샘플 ${samples.length}개 · ${remaining}초`);
                await wait(EXPOSURE_SAMPLE_INTERVAL_MS);
            }

            return samples;
        }

        function scheduleExposureRetry(track) {
            if (exposureLocked || exposureRetryTimer) return;

            exposureRetryTimer = setTimeout(async () => {
                exposureRetryTimer = null;
                if (exposureLocked || exposureRetryRunning) return;

                exposureRetryRunning = true;
                const samples = await collectExposureSamples(EXPOSURE_RETRY_SAMPLE_MS);
                exposureRetryRunning = false;

                if (exposureLocked || samples.length === 0) return;

                const summary = summarizeSamples(samples);
                const readiness = evaluateExposureReadiness(summary);
                if (!readiness.ok) {
                    updateExposureStatus(readiness.label, readiness.reason === 'tooBright' ? 'blocked' : 'live', readiness.detail);
                    scheduleExposureRetry(track);
                    return;
                }

                updateExposureStatus('AE 잠금 재시도', 'checking', readiness.detail);
                const compensation = getSkyExposureCompensation(track);
                const locked = await applyExposureConstraints(track, 'manual', compensation);
                if (locked) {
                    exposureLocked = true;
                    updateExposureStatus('AE 잠금 ON', 'locked', readiness.detail);
                    setStatus('AE 잠금 완료 — 이제 측정값 안정도를 확인하며 기록하세요.', 'ok');
                } else {
                    updateExposureStatus('AE 잠금 미지원', 'unsupported', 'AE 유지 · 수동 잠금 불가');
                }
            }, EXPOSURE_RETRY_MS);
        }

        async function prepareSkyExposure(track) {
            const exposureCompensation = getSkyExposureCompensation(track);
            updateExposureStatus('AE 보정 중', 'checking', `${exposureCompensation >= 0 ? '보정값 +' : '보정값 '}${exposureCompensation}`);

            const autoReady = await applyExposureConstraints(track, 'continuous', exposureCompensation)
                || await applyExposureConstraints(track, 'auto', exposureCompensation);

            if (!autoReady) {
                updateExposureStatus('AE 제어 미지원', 'unsupported', '브라우저/기기 제한');
            }

            const samples = await collectExposureSamples();
            if (samples.length === 0) {
                updateExposureStatus('AE 확인 실패', 'unsupported', '영상 샘플 없음');
                return { locked: false, reason: 'noSamples' };
            }

            const summary = summarizeSamples(samples);
            const readiness = evaluateExposureReadiness(summary);
            if (!readiness.ok) {
                updateExposureStatus(readiness.label, readiness.reason === 'tooBright' ? 'blocked' : 'live', readiness.detail);
                return { locked: false, reason: readiness.reason, summary };
            }

            updateExposureStatus('AE 잠금 시도', 'checking', readiness.detail);
            const locked = await applyExposureConstraints(track, 'manual', exposureCompensation);

            if (locked) {
                updateExposureStatus('AE 잠금 ON', 'locked', readiness.detail);
                exposureLocked = true;
                return { locked: true, reason: 'locked', summary };
            }

            updateExposureStatus('AE 잠금 미지원', 'unsupported', 'AE 유지 · 수동 잠금 불가');
            return { locked: false, reason: 'unsupported', summary };
        }

        // 카메라 중앙 20% 영역에서 평균 휘도 계산
        function calcLuminanceFromVideo(updateStabilityState = true) {
            const video = document.getElementById('video');
            if (!video.videoWidth) return null;

            const canvas = document.createElement('canvas');
            const cropRatio = 0.2;
            const cropWidth = Math.floor(video.videoWidth * cropRatio);
            const cropHeight = Math.floor(video.videoHeight * cropRatio);
            const cropX = Math.floor((video.videoWidth - cropWidth) / 2);
            const cropY = Math.floor((video.videoHeight - cropHeight) / 2);
            const scale = 0.5; // 중앙부만 저해상도로 빠르게 처리
            canvas.width = Math.max(1, Math.floor(cropWidth * scale));
            canvas.height = Math.max(1, Math.floor(cropHeight * scale));
            const ctx = canvas.getContext('2d');
            ctx.drawImage(
                video,
                cropX,
                cropY,
                cropWidth,
                cropHeight,
                0,
                0,
                canvas.width,
                canvas.height
            );

            const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            let sum = 0;
            const pixels = data.length / 4;
            for (let i = 0; i < data.length; i += 4) {
                // 인간 눈 밝기 가중치 (luminance)
                sum += data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114;
            }
            const avg = sum / pixels;
            // 0~255 → 0~1000 하늘 밝기 지수 선형 변환 (상대값)
            currentLuminanceIndex = Math.round((avg / 255) * 1000);
            document.getElementById('luminance-value').textContent = currentLuminanceIndex;
            updateLuminanceMeter(currentLuminanceIndex);
            if (updateStabilityState) updateStability(currentLuminanceIndex);
            return currentLuminanceIndex;
        }

        // 카메라 시작 버튼
        document.getElementById('btn-start').addEventListener('click', async () => {
            try {
                setStatus('카메라 권한 요청 중...', 'warn');
                videoStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment" }
                });
                const [track] = videoStream.getVideoTracks();
                exposureLocked = false;
                if (exposureRetryTimer) {
                    clearTimeout(exposureRetryTimer);
                    exposureRetryTimer = null;
                }
                const video = document.getElementById('video');
                video.srcObject = videoStream;
                await video.play().catch(() => {});
                document.getElementById('cameraLabel').textContent = '';

                const exposureResult = await prepareSkyExposure(track);

                // 하늘 밝기 지수 실시간 갱신 (1초마다)
                luminanceInterval = setInterval(calcLuminanceFromVideo, 1000);

                document.getElementById('btn-start').textContent = '✅ 카메라 작동 중';
                document.getElementById('btn-start').style.opacity = '0.5';
                document.getElementById('btn-start').disabled = true;
                document.getElementById('btn-measure').disabled = false;

                if (exposureResult.reason === 'locked') {
                    setStatus('AE 잠금 완료 — 측정값 안정도를 확인하며 기록하세요.', 'ok');
                } else if (exposureResult.reason === 'tooDark') {
                    setStatus('화면이 아직 너무 어두워 AE를 유지합니다. 하늘을 향한 채 조금 더 기다려주세요.', 'warn');
                } else if (exposureResult.reason === 'tooBright') {
                    setStatus('직접광이 너무 강해 AE 잠금을 보류했습니다. 라이트를 끄고 하늘만 프레임에 넣어주세요.', 'warn');
                } else if (exposureResult.reason === 'notStable') {
                    setStatus('노출이 아직 안정되지 않아 AE를 유지합니다. 휴대폰을 고정하고 다시 관찰하세요.', 'warn');
                } else {
                    setStatus('이 기기/브라우저는 AE 수동 잠금을 지원하지 않아 자동 노출로 측정합니다.', 'warn');
                }
                if (!exposureResult.locked && exposureResult.reason !== 'noSamples') {
                    scheduleExposureRetry(track);
                }
            } catch (err) {
                setStatus('카메라 권한을 허용해주세요', 'err');
            }
        });

        // 측정 기록 버튼
        document.getElementById('btn-measure').addEventListener('click', () => {
            if (!currentLat) {
                setStatus('GPS 위치를 아직 못 잡았습니다. 잠시 기다려주세요.', 'warn');
                return;
            }

            const now = new Date();
            const timeStr = now.toLocaleTimeString('ko-KR');

            records.push({
                time: timeStr,
                lat: currentLat,
                lng: currentLng,
                luminanceIndex: currentLuminanceIndex,
                exposureCompensation: selectedExposureCompensation
            });

            // 리스트에 추가
            const li = document.createElement('li');
            li.innerHTML = `
                <div>
                    <div class="rec-time">${timeStr}</div>
                    <div class="rec-loc">${currentLat}, ${currentLng}</div>
                </div>
                <div class="rec-luminance">${currentLuminanceIndex} LI · EC ${selectedExposureCompensation >= 0 ? '+' : ''}${selectedExposureCompensation}</div>
            `;
            document.getElementById('record-list').prepend(li);
            document.getElementById('record-count').textContent = `기록: ${records.length}개`;
            setStatus(`✔ 저장됨 — 휘도 지수 ${currentLuminanceIndex}, EC ${selectedExposureCompensation >= 0 ? '+' : ''}${selectedExposureCompensation} @ ${currentLat}, ${currentLng}`, 'ok');
        });

        // CSV 다운로드
        document.getElementById('btn-csv').addEventListener('click', () => {
            if (records.length === 0) {
                setStatus('다운로드할 데이터가 없습니다.', 'warn');
                return;
            }

            let csv = "\uFEFF" + "Time,Latitude,Longitude,Luminance_Index,Exposure_Compensation\n";
            records.forEach(r => {
                csv += `${r.time},${r.lat},${r.lng},${r.luminanceIndex},${r.exposureCompensation}\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `light_data_${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            setStatus('CSV 다운로드 완료', 'ok');
        });
    </script>
</body>
</html>
